---
- name: Verify
  hosts: all
  vars_files:
    - ../../defaults/main.yml
  tasks:

    - name: Verify Xvfb command
      ansible.builtin.command: which Xvfb
      changed_when: false

    - name: Check if Xvfb service is running
      when: xvfb_service_enabled | default(true)
      block:
        - name: Check Xvfb status in supervisor
          # noqa: command-instead-of-module - Using command for status check.
          ansible.builtin.command: supervisorctl status xvfb
          register: xvfb_status
          changed_when: false
          failed_when: false

        - name: Assert Xvfb is running in supervisor
          ansible.builtin.assert:
            that: "'RUNNING' in xvfb_status.stdout"
            fail_msg: "Xvfb is not running in supervisor (status: {{ xvfb_status.stdout | default('N/A') }})"

        - name: Check if Xvfb process is running
          ansible.builtin.command: ps -e
          register: ps_output
          changed_when: false

        - name: Assert Xvfb process is running
          ansible.builtin.assert:
            that: "'Xvfb' in ps_output.stdout"
            fail_msg: "Xvfb process not found in process list"

        - name: Verify Xvfb log file exists
          ansible.builtin.stat:
            path: /var/log/supervisor/xvfb.log
          register: xvfb_log

        - name: Assert Xvfb log file exists
          ansible.builtin.assert:
            that: xvfb_log.stat.exists
            fail_msg: "Xvfb supervisor log file /var/log/supervisor/xvfb.log does not exist"
