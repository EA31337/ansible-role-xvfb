---
- name: Prepare hosts
  hosts: "all:!nixos*"
  gather_facts: false
  tasks:

    - name: Install Python for Ansible
      ansible.builtin.raw: |
        if command -v python3 || command -v python; then
          exit 0
        elif command -v apk; then
          apk add --no-cache python3 py3-pip procps
        elif command -v apt; then
          if [ -f /etc/os-release ] && grep -qi '^ID=ubuntu' /etc/os-release; then
            sed -i -e 's|http://archive.ubuntu.com/ubuntu|http://azure.archive.ubuntu.com/ubuntu|g' \
              -e 's|http://security.ubuntu.com/ubuntu|http://azure.archive.ubuntu.com/ubuntu|g' /etc/apt/sources.list
          fi
          DEBIAN_FRONTEND=noninteractive apt -y update && \
          DEBIAN_FRONTEND=noninteractive apt install -y python3-minimal procps
        elif command -v dnf; then
          dnf install -y python3
        elif command -v zypper; then
          zypper --non-interactive install python3
        else
          echo "No supported package manager found" >&2
          exit 1
        fi
      changed_when: false

- name: Prepare NixOS hosts
  hosts: "nixos*"
  gather_facts: false
  tasks:

    - name: Install Python for Ansible on NixOS
      ansible.builtin.raw: |
        if command -v python3 || command -v python; then
          exit 0
        fi
        mkdir -p /etc/nix
        printf "sandbox = false\n" > /etc/nix/nix.conf
        export NIX_CONFIG="sandbox = false"
        nix-env --option sandbox false \
          -iA nixpkgs.python3 nixpkgs.python3Packages.pip
      changed_when: false
