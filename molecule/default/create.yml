---
# Custom create playbook that injects host CA certificates into the Docker
# build context before delegating to molecule-docker's default create playbook.
#
# This allows Docker image builds (Alpine apk, NixOS nix-channel) to trust
# MITM proxy CA certificates that are installed on the host but absent from
# the container base images.
- name: Pre-create - inject host CA certificates into build context
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:

    - name: Find custom CA certificates on host
      ansible.builtin.find:
        paths: /usr/local/share/ca-certificates
        patterns: "*.crt"
      register: host_ca_certs

    - name: Write combined custom CA bundle to scenario directory
      when: host_ca_certs.files | length > 0
      ansible.builtin.assemble:
        src: /usr/local/share/ca-certificates
        dest: "{{ molecule_scenario_directory }}/custom-ca.crt"
        mode: "0644"
        regexp: '\.crt$'

    - name: Ensure empty custom CA placeholder exists
      when: host_ca_certs.files | length == 0
      ansible.builtin.copy:
        content: ""
        dest: "{{ molecule_scenario_directory }}/custom-ca.crt"
        force: true
        mode: "0644"

# Delegate to the standard molecule-docker create playbook.
- import_playbook: >-
    {{ lookup('pipe', 'python3 -c "import molecule_docker, os; ' ~
    'print(os.path.dirname(molecule_docker.__file__))"') ~
    '/playbooks/create.yml' }}
