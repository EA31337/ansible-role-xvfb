---
- name: Ensures Xvfb package is installed
  become: "{{ ansible_facts['user_id'] | default('root') != 'root' }}"
  community.general.apk:
    name: xvfb
    state: present
    update_cache: true

- name: Ensures X11 utilities are installed
  become: "{{ ansible_facts['user_id'] | default('root') != 'root' }}"
  community.general.apk:
    name: xdpyinfo
    state: present
  no_log: "{{ ansible_verbosity | default(0) < 1 }}"
  when: xvfb_install_x11_utils

- name: Ensure Xvfb is service installed
  become: "{{ ansible_facts['user_id'] | default('root') != 'root' }}"
  when: xvfb_service_enabled
  block:

    - name: Ensure supervisor is installed
      become: "{{ ansible_facts['user_id'] | default('root') != 'root' }}"
      community.general.apk:
        name: supervisor
        state: present
        update_cache: true

    - name: Include configuration tasks for supervisor
      ansible.builtin.include_tasks:
        file: supervisord.yml
