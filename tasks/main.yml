---
- name: Detect NixOS if not already set
  ansible.builtin.set_fact:
    ansible_os_family: NixOS
  when:
    - ansible_facts['os_family'] is defined
    - ansible_facts['os_family'] not in ['Alpine', 'Debian', 'NixOS']
    - (ansible_facts['distribution'] is defined and ansible_facts['distribution'] == 'NixOS') or
      ('nixos' in (inventory_hostname | lower)) or
      (ansible_facts['pkg_mgr'] is defined and ansible_facts['pkg_mgr'] == 'nix')

- name: Includes operating system specific tasks to install Xvfb
  ansible.builtin.include_tasks:
    file: "{{ role_path }}/tasks/{{ ansible_os_family }}.yml"
  tags: xvfb

- name: Get supervisord status for Xvfb
  become: "{{ ansible_facts['user_id'] != 'root' }}"
  community.general.supervisorctl:
    name: xvfb
    state: present
  when: xvfb_service_enabled | bool
