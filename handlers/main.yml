---
# Handlers file for xvfb role.

- name: All services are present
  community.general.supervisorctl:
    config: "{{ supervisor_conf_file | default(omit) }}"
    name: all
    state: present
  changed_when: true
  when: xvfb_service_enabled | bool

- name: Restart Xvfb service
  community.general.supervisorctl:
    config: "{{ supervisor_conf_file | default(omit) }}"
    name: xvfb
    state: restarted
  changed_when: true
  when: xvfb_service_enabled | bool
