---
# See: <https://opencode.ai/docs>
name: Cogni AI Agent (Sudo)

# yamllint disable-line rule:truthy
on:
  workflow_dispatch:
    inputs:
      model:
        default: opencode/gemini-3-flash
        description: Model to use for OpenCode
        options:
          - opencode/gemini-3.1-pro
          - opencode/gemini-3-flash
        required: true
        type: choice
      prompt:
        description: Prompt for the agent
        required: true
        type: string

# Prevent concurrent runs on the same branch to avoid push conflicts.
# When a new run is triggered, it will queue until the previous pending run completes.
# On the default branch each run gets a unique group (github.run_id) so runs can
# proceed in parallel, since each one branches off to its own new branch.
# See: https://docs.github.com/en/actions/using-workflows/workflow-syntax-for-github-actions#concurrency
concurrency:
  cancel-in-progress: false
  group: >-
    cogni-ai-agent-sudo-${{
      (github.ref_name != github.event.repository.default_branch && github.ref)
      || github.run_id
    }}

jobs:
  cogni-ai-agent-sudo:
    name: Run Cogni AI agent (Sudo)
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      issues: write
      packages: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false  # Prevents Duplicate header: "Authorization" error.
      - uses: actions/setup-python@v6.1.0
        with:
          python-version: '3.12'
      - name: Restore Python user site
        id: python-user-site
        uses: actions/cache@v5.0.1
        with:
          path: ~/.local
          key: ${{ runner.os }}-pip-${{ hashFiles('.devcontainer/requirements.txt') }}
      - name: Install Python dependencies
        if: steps.python-user-site.outputs.cache-hit != 'true'
        run: python -m pip install --user -r .devcontainer/requirements.txt
      - name: Ensure local bin on PATH
        run: echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      # See: <https://github.com/Cogni-AI-OU/cogni-ai-agent-action>
      - name: Run Cogni AI Agent
        uses: Cogni-AI-OU/cogni-ai-agent-action@main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          model: ${{ inputs.model }}
          opencode-api-key: ${{ secrets.OPENCODE_API_KEY }}  # <https://opencode.ai/auth>
          permissions: |-
            bash:
              '*': allow
          prompt: ${{ inputs.prompt }}
