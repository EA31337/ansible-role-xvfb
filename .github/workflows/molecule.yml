---
name: Molecule

# yamllint disable-line rule:truthy
on:
  pull_request:
    paths-ignore:
      - '.github/workflows/cogni-ai-agent.yml'
      - '.github/workflows/copilot-setup-steps.yml'
      - '.github/workflows/galaxy-publish.yml'
      - '**.cfg'
      - '**.md'
      - '.*'
      - LICENSE
      - Pipfile*
  push:
    paths-ignore:
      - '.github/workflows/cogni-ai-agent.yml'
      - '.github/workflows/copilot-setup-steps.yml'
      - '.github/workflows/galaxy-publish.yml'
      - '**.cfg'
      - '**.md'
      - '.*'
      - LICENSE
      - Pipfile*

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        scenario:
          - default
        platform:
          - alpine-latest
          - debian-latest
          - nixos-latest
          - ubuntu-jammy
          - ubuntu-noble
    env:
      MOLECULE_REPORT: molecule-${{ matrix.scenario }}-${{ matrix.platform }}-report.html
    steps:
      - uses: actions/checkout@v6
        with:
          path: ${{ github.repository }}
          persist-credentials: false  # Prevents Duplicate header: "Authorization" error.
      - name: Cache Ansible collections
        uses: actions/cache@v4
        with:
          path: ${{ github.repository }}/collections
          key: ${{ runner.os }}-ansible-collections-${{ hashFiles(format('{0}/requirements.yml', github.repository)) }}
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles(format('{0}/Pipfile*', github.repository)) }}
          restore-keys: |
            ${{ runner.os }}-pip-
      - name: Install Ansible collections
        run: |
          pip install 'ansible-core~=2.17.0'
          ansible-galaxy collection install -r requirements.yml -p collections
        working-directory: ${{ github.repository }}
      - uses: gofrolist/molecule-action@v2
        env:
          ANSIBLE_FORCE_COLOR: '1'
          ANSIBLE_STDOUT_CALLBACK: ${{ runner.debug == '1' && 'debug' || 'ansible.builtin.default' }}
          ANSIBLE_CALLBACK_RESULT_FORMAT: yaml
          ANSIBLE_COLLECTIONS_PATH: ${{ github.workspace }}/${{ github.repository }}/collections
        with:
          molecule_args: --scenario-name ${{ matrix.scenario }} --platform-name ${{ matrix.platform }}
          molecule_command: test
          molecule_options: ${{ runner.debug == '1' && '--verbose' || '' }}
          molecule_working_dir: ${{ github.repository }}
      - if: always()
        name: Summarize Molecule report
        run: |
          REPORT="${MOLECULE_REPORT}"
          if [ -f "$REPORT" ]; then
            # Fix permissions (the file might be owned by root if created in a container).
            sudo chown "$USER":"$USER" "$REPORT" || true

            {
              echo "## Molecule Summary - ${{ matrix.scenario }}"
              echo ""
              # Extract Play Recap
              echo "### Play Recap"
              echo '```'
              sed 's/<[^>]*>//g; s/&nbsp;/ /g; s/&lt;/</g; s/&gt;/>/g; s/&amp;/\&/g' "$REPORT" | \
                awk '/PLAY RECAP/ {p=1} p; /^[[:space:]]*$/ && p {p=0}' | \
                grep -v "^$" | head -n 20
              echo '```'

              # Extract Errors and Warnings
              echo "<details><summary>Errors and Warnings (click to expand)</summary>"
              echo ""
              echo '```'
              sed 's/<[^>]*>//g; s/&nbsp;/ /g; s/&lt;/</g; s/&gt;/>/g; s/&amp;/\&/g' "$REPORT" | \
                grep -iE "error|warning|fail" | grep -vE "ok=|changed=" | head -n 50
              echo '```'
              echo "</details>"
            } >> "$GITHUB_STEP_SUMMARY"
          fi
        working-directory: ${{ github.repository }}
      - if: always()
        name: Upload Molecule report artifact
        uses: actions/upload-artifact@v4
        with:
          if-no-files-found: warn
          name: molecule-${{ matrix.scenario }}-${{ matrix.platform }}-report
          path: ${{ github.repository }}/${{ env.MOLECULE_REPORT }}
      # Debug with tmate on failure when debug logging is enabled.
      - if: ${{ failure() && runner.debug == '1' }}
        uses: mxschmitt/action-tmate@v3
    timeout-minutes: 40
