---
- name: Build NixOS Docker image
  hosts: localhost
  gather_facts: false
  tags: always
  vars:
    controller_python: "{{ ansible_playbook_python }}"
    nixos_built_image: xvfb-nixos:latest
    nixos_dockerfile_output: >-
      {{ playbook_dir }}/../../molecule/resources/playbooks/Dockerfile.xvfb-on-nixos
    nixos_dockerfile_template: >-
      {{ playbook_dir }}/../../molecule/resources/playbooks/Dockerfile.j2
  tasks:
    - name: Render Dockerfile for NixOS image
      ansible.builtin.template:
        src: "{{ nixos_dockerfile_template }}"
        dest: "{{ nixos_dockerfile_output }}"
        mode: "0644"
      vars:
        item:
          name: xvfb-on-nixos-latest
          image: nixos/nix:latest
        ansible_python_interpreter: "{{ controller_python }}"
      when: "'xvfb-on-nixos-latest' in groups['docker_containers']"

    - name: Build NixOS image with Python preinstalled
      community.docker.docker_image:
        name: "{{ nixos_built_image }}"
        build:
          path: "{{ nixos_dockerfile_output | dirname }}"
          dockerfile: "{{ nixos_dockerfile_output | basename }}"
        source: build
        force_source: true
      when: "'xvfb-on-nixos-latest' in groups['docker_containers']"
      vars:
        ansible_python_interpreter: "{{ controller_python }}"

- name: Configure Docker container
  # Note: Since facts are not gathered, we're checking for ansible_user_id, connection_user or UID instead.
  become: >-
    {{
      (connection_user | default('root')) != 'root'
      or (ansible_user_id | default('root')) != 'root'
      or (ansible_user_uid | default(0) | int) != 0
      or (((ansible_env | default({}))['UID'] | default(0) | int) != 0)
      or (
        ((ansible_env | default({}))['USER']
        | default(((ansible_env | default({}))['LOGNAME'] | default('root'))) )
        != 'root'
      )
    }}
  # Use su as become_method as sudo is not available in all containers.
  become_method: ansible.builtin.su
  gather_facts: false
  hosts: docker_containers

  pre_tasks:
    - name: Ensure container is started
      community.docker.docker_container:
        name: "{{ inventory_hostname }}"
        image: "{{ container_image }}"
        state: started
        command: sleep infinity
        # NixOS containers require privileged mode due to non-standard filesystem layout.
        privileged: "{{ container_image is search('nixos') }}"
        # Relaxed seccomp/apparmor for NixOS compatibility.
        security_opts: >-
          {{ ['seccomp=unconfined', 'apparmor=unconfined']
          if container_image is search('nixos') else omit }}
        recreate: true
        pull: >-
          {{ not (container_image is search('xvfb-nixos')) }}
      delegate_to: localhost
      vars:
        # Use system Python with requests installed for controller-side Docker modules.
        ansible_python_interpreter: "{{ controller_python }}"

    - name: Wait for container to be ready
      community.docker.docker_container_info:
        name: "{{ inventory_hostname }}"
      register: container_info
      until:
        - container_info is defined
        - container_info.container.State.Running | default(false) | bool
      changed_when: false
      delay: 2
      delegate_to: localhost
      retries: 10
      vars:
        # Use system Python with requests installed for controller-side Docker modules.
        ansible_python_interpreter: "{{ controller_python }}"

    - name: Install Python 3 on Alpine
      ansible.builtin.raw: |
        test -e "{{ ansible_python_interpreter }}" || (apk update && apk add --no-cache python3 py3-pip)
      changed_when: false
      when: container_image is search("alpine")

    - name: Install Python 3 on Ubuntu/Debian
      ansible.builtin.raw: |
        test -e "{{ ansible_python_interpreter }}" || (apt-get update && apt-get install -y python3 python3-pip)
      changed_when: false
      when: container_image is search("ubuntu") or container_image is search("debian")

    - name: Gather facts
      ansible.builtin.setup:

    - name: Install Python packages for Ubuntu/Debian
      ansible.builtin.apt:
        name:
          - python3
          - python3-pip
          - python3-setuptools
        state: present
        update_cache: true
      when: container_image is search("ubuntu") or container_image is search("debian")

  tags: always
  vars:
    controller_python: "{{ ansible_playbook_python }}"
    nixos_built_image: xvfb-nixos:latest
    container_image_map:
      xvfb-on-alpine-latest: alpine:latest
      xvfb-on-debian-latest: debian:latest
      xvfb-on-nixos-latest: "{{ nixos_built_image }}"
      xvfb-on-ubuntu-jammy: ubuntu:jammy
      xvfb-on-ubuntu-latest: ubuntu:latest
      xvfb-on-ubuntu-noble: ubuntu:noble
    container_image: "{{ container_image_map[inventory_hostname] | default('ubuntu:latest') }}"

- name: Install ea31337.xvfb role on all containers
  hosts: docker_containers
  gather_facts: true
  tags: always
  vars:
    controller_python: "{{ ansible_playbook_python }}"
  pre_tasks:
    - name: Set ansible_os_family for NixOS hosts
      ansible.builtin.set_fact:
        ansible_os_family: NixOS
      when: (ansible_distribution == 'NixOS') or ('nixos' in (inventory_hostname | lower))
  tasks:
    - name: Installs ea31337.xvfb role
      ansible.builtin.import_role:
        name: ea31337.xvfb

  post_tasks:
    - name: Stop Docker containers
      community.docker.docker_container:
        name: "{{ inventory_hostname }}"
        state: stopped
      delegate_to: localhost
      failed_when: false
