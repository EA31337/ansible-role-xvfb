---
- name: Install Python 3 on Alpine
  ansible.builtin.raw: |
    command -v python3 >/dev/null 2>&1 || \
      (apk update -q && apk add -q --no-cache python3 py3-pip sudo bash ca-certificates procps)
  changed_when: false
  when: container_image | default('') is search("alpine")

- name: Install Python 3 on Ubuntu/Debian
  ansible.builtin.raw: |
    if command -v python3 >/dev/null 2>&1; then exit 0; fi
    if [ -f /etc/os-release ] && grep -qi '^ID=ubuntu' /etc/os-release; then
      mirror="http://azure.archive.ubuntu.com/ubuntu"
      if [ -f /etc/apt/sources.list ]; then
        sed -i \
          -e "s|http://archive.ubuntu.com/ubuntu|$mirror|g" \
          -e "s|http://security.ubuntu.com/ubuntu|$mirror|g" \
          /etc/apt/sources.list
      fi
      if [ -f /etc/apt/sources.list.d/ubuntu.sources ]; then
        sed -i \
          -e "s|http://archive.ubuntu.com/ubuntu|$mirror|g" \
          -e "s|http://security.ubuntu.com/ubuntu|$mirror|g" \
          /etc/apt/sources.list.d/ubuntu.sources
      fi
    fi
    export DEBIAN_FRONTEND=noninteractive
    apt-get update -qq && \
      apt-get install -y -qq --no-install-recommends python3 python3-pip procps sudo ca-certificates
  changed_when: false
  when: container_image | default('') is search("ubuntu") or container_image | default('') is search("debian")

- name: Install or verify Python on NixOS
  ansible.builtin.raw: |
    PATH=/root/.nix-profile/bin:/nix/var/nix/profiles/default/bin:/run/current-system/sw/bin:$PATH
    if ! command -v python3 >/dev/null 2>&1; then
      mkdir -p /etc/nix
      printf "sandbox = false\n" > /etc/nix/nix.conf
      export NIX_CONFIG="sandbox = false"
      nix-channel --update > /dev/null 2>&1
      nix-env --option sandbox false -iA nixpkgs.python3 nixpkgs.python3Packages.pip \
        nixpkgs.sudo nixpkgs.procps > /dev/null 2>&1
    fi
  changed_when: false
  when: container_image | default('') is search("nixos")

- name: Bootstrap Python 3 (generic)
  ansible.builtin.raw: |
    if command -v python3 >/dev/null 2>&1 || command -v python >/dev/null 2>&1; then
      exit 0
    elif command -v apk >/dev/null 2>&1; then
      apk update -q && apk add -q --no-cache python3 py3-pip procps sudo bash ca-certificates
    elif command -v apt-get >/dev/null 2>&1; then
      if [ -f /etc/os-release ] && grep -qi '^ID=ubuntu' /etc/os-release; then
        mirror="http://azure.archive.ubuntu.com/ubuntu"
        if [ -f /etc/apt/sources.list ]; then
          sed -i \
            -e "s|http://archive.ubuntu.com/ubuntu|$mirror|g" \
            -e "s|http://security.ubuntu.com/ubuntu|$mirror|g" \
            /etc/apt/sources.list
        fi
        if [ -f /etc/apt/sources.list.d/ubuntu.sources ]; then
          sed -i \
            -e "s|http://archive.ubuntu.com/ubuntu|$mirror|g" \
            -e "s|http://security.ubuntu.com/ubuntu|$mirror|g" \
            /etc/apt/sources.list.d/ubuntu.sources
        fi
      fi
      export DEBIAN_FRONTEND=noninteractive
      apt-get update -qq && \
      apt-get install -y -qq --no-install-recommends python3 python3-pip procps sudo ca-certificates
    elif command -v dnf >/dev/null 2>&1; then
      dnf install -y -q python3
    elif command -v zypper >/dev/null 2>&1; then
      zypper -q --non-interactive install python3
    elif command -v nix-env >/dev/null 2>&1; then
      mkdir -p /etc/nix
      printf "sandbox = false\n" > /etc/nix/nix.conf
      export NIX_CONFIG="sandbox = false"
      nix-channel --update > /dev/null 2>&1
      nix-env --option sandbox false -iA nixpkgs.python3 nixpkgs.python3Packages.pip > /dev/null 2>&1
    else
      echo "No supported package manager found" >&2
      exit 1
    fi
  changed_when: false
  when: (container_image | default('') | length) == 0

- name: Discover Python interpreter
  ansible.builtin.raw: |
    if [ -x /root/.nix-profile/bin/python3 ]; then
      echo "/root/.nix-profile/bin/python3"
    elif [ -x /usr/bin/python3 ]; then
      echo "/usr/bin/python3"
    else
      command -v python3
    fi
  register: discovered_python
  changed_when: false

- name: Set ansible_python_interpreter
  ansible.builtin.set_fact:
    ansible_python_interpreter: "{{ discovered_python.stdout | trim }}"
  when: (discovered_python.stdout | trim | length) > 0
