---
- name: Provision dev container
  hosts: localhost
  connection: local
  become: true
  vars:
    apt_packages:
      - coreutils
      - direnv
      - figlet
      - findutils
      - gh
      - git
      - links
      - mawk
      - sed
      - time
      - vim
    python_requirements:
      - ansible
      - ansible-lint
      - argcomplete>=1.9.4
      - docker>=7.1
      - jinja2-cli
      - molecule
      - molecule-docker
      - pipenv
      - pre-commit
      - requests==2.32.5
      - uv
    ansible_python_requirements:
      - docker>=7.1
      - requests==2.32.5

  tasks:
    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true

    - name: Install apt packages
      ansible.builtin.apt:
        name: "{{ apt_packages }}"
        state: present

    - name: Install python requirements
      ansible.builtin.pip:
        name: "{{ python_requirements }}"
        state: present

    - name: Install ansible via pipx
      ansible.builtin.command: pipx install --include-deps --force ansible
      become: false
      register: pipx_install
      changed_when: "'already installed' not in pipx_install.stderr"
      failed_when: pipx_install.rc != 0 and 'already installed' not in pipx_install.stderr

    - name: Inject ansible python requirements
      ansible.builtin.command: "pipx inject ansible {{ item }}"
      loop: "{{ ansible_python_requirements }}"
      become: false
      changed_when: true

    - name: Install ansible collections
      ansible.builtin.command: ansible-galaxy collection install -r requirements.yml
      become: false
      register: galaxy_result
      changed_when: "'nothing to do' not in galaxy_result.stdout"

    - name: Install pre-commit hooks
      ansible.builtin.command: pre-commit install
      become: false
      changed_when: true
